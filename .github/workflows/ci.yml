name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    if: ${{ false }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --release

      - name: Test (Kaotik focus)
        run: cargo test --release test_kaotik_

      - name: Test (Kaotik determinism)
        run: cargo test --release test_kaotik_layers_deterministic_with_fixed_salt

      - name: Test
        run: cargo test --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings
